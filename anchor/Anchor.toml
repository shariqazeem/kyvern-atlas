[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.devnet]
kyvern_policy = "PpmZErWfT5zpeo1fJtTbpqezFGbRUamaNNRWViaMSqc"

[programs.localnet]
kyvern_policy = "PpmZErWfT5zpeo1fJtTbpqezFGbRUamaNNRWViaMSqc"

[registry]
